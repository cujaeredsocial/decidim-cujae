services:
  app:
    build: .
    container_name: decidim-cujae
    volumes:
      - .:/app
      - decidim-storage:/app/storage
      - bundle:/usr/local/bundle
      - node_modules:/app/node_modules
    environment:
      - PORT=3000
      - DATABASE_HOST=pg
      - DATABASE_USERNAME=postgres
    env_file:
      - .env
    ports:
      - 3000:3000
    links:
      - pg
  pg:
    image: postgres:14.5
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  node_modules: {}
  bundle: {}
  pg-data: {}
  decidim-storage: {}
