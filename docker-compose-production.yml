services:
  app:
    image: decidim-cujae:latest
    container_name: decidim-cujae
    volumes:
      - decidim-storage:/app/storage
    environment:
      - PORT=3000
      - DATABASE_HOST=pg
      - DATABASE_USERNAME=postgres
    env_file:
      - .env
    ports:
      - 3000:3000
    links:
      - pg
  pg:
    image: postgres:14.5
    volumes:
      - pg-data:/var/lib/postgresql/data

volumes:
  pg-data: {}
  decidim-storage: {}
